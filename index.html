<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Full Page Image</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }

        body {
            background-image: url("https://i.guim.co.uk/img/media/327aa3f0c3b8e40ab03b4ae80319064e401c6fbc/377_133_3542_2834/master/3542.jpg?width=620&dpr=2&s=none&crop=none");
            background-size: cover;        /* Makes image fill the page */
            background-position: center;   /* Keeps it centered */
            background-repeat: no-repeat;  /* Prevents tiling */
        }
    </style>
</head>
<body>
</body>
</html>
